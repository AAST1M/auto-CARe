version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    # Run vite dev server with host binding for Docker
    command: npx vite --host 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5001

  backend:
    build:
      context: ./backend
    # Run backend using tsx watch for hot-reloading
    command: npx tsx watch src/index.ts
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5001
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/autocare
      - JWT_SECRET=super_secret_jwt_key_that_is_at_least_32_chars_long
      - ALLOWED_ORIGIN=http://localhost:3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=autocare
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
