name: AutoCare Platform CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 20
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm ci

    - name: Build and test Backend
      run: |
        cd backend
        npm ci
        npx prisma generate
        npm run test
        npm run build

    - name: Generate Prisma Client
      run: |
        cd backend
        npx prisma generate

    - name: Typecheck Backend
      run: |
        cd backend
        npx tsc --noEmit

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Typecheck Frontend
      run: |
        cd frontend
        npx tsc --noEmit

    - name: Install Root Dependencies
      run: |
        npm ci

    - name: Build and test Frontend
      run: |
        cd frontend
        npm run build
        cd ..
        npx playwright install --with-deps
        npx playwright test
