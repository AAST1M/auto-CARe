<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Auto-Care AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Exo 2', 'sans-serif'],
            },
            colors: {
              cyber: {
                900: '#020617', // Deep space blue
                800: '#0f172a',
                700: '#1e293b',
                600: '#334155',
                primary: '#3b82f6', // Electric Blue
                accent: '#06b6d4', // Cyan neon
                success: '#10b981',
                danger: '#ef4444',
              }
            },
            animation: {
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 3s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #f8fafc; /* slate-50 */
      }
      html.dark body {
        background-color: #020617; /* cyber-900 */
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #3b82f6;
        border-radius: 4px;
      }
      
      /* Dynamic Glass Panel */
      .glass-panel {
        /* Light Mode Default */
        background: rgba(255, 255, 255, 0.85);
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(59, 130, 246, 0.1);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      }
      
      /* Dark Mode Override */
      .dark .glass-panel {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(59, 130, 246, 0.2);
        box-shadow: none;
      }

      .neon-border {
        box-shadow: 0 0 10px rgba(59, 130, 246, 0.3), inset 0 0 5px rgba(59, 130, 246, 0.1);
      }
      
      .dark .neon-text {
        text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
      }
      .neon-text {
        text-shadow: none; /* No neon text in light mode for readability */
      }
      .floating-map-controls {
        bottom: calc(var(--sheet-height, 350px) + 16px);
      }
      .animate-ping-custom-1 {
        animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
      }
      .animate-ping-custom-2 {
        animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
        animation-delay: 0.3s;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
